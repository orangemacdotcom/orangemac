const telDigits = (ph) => ph.replace(/\D/g,'');

/* Wrap phone patterns in a tel: anchor inside a string */
function withPhoneLinks(text) {
  if (!text || typeof text !== 'string') return text;
  const phoneRe = /\(\d{3}\)\s*\d{3}-\d{4}/g;
  const parts = [];
  let last = 0, m;
  while ((m = phoneRe.exec(text)) !== null) {
    if (m.index > last) parts.push(text.slice(last, m.index));
    const digits = m[0].replace(/\D/g,'');
    parts.push(<a key={m.index} href={`tel:${digits}`} className="tel-link">{m[0]}</a>);
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push(text.slice(last));
  return parts.length ? parts : text;
}

    Inactive:    { bg:'#f3f4f6', color:'#6b7280', dot:'#9ca3af' },
    Completed:   { bg:'#f3f4f6', color:'#6b7280', dot:'#9ca3af' },
    'Picked Up': { bg:'#f3f4f6', color:'#6b7280', dot:'#9ca3af' },
  };
  const c = map[status] || map.Active;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, padding:'3px 9px', borderRadius:99, background:c.bg, color:c.color, fontSize:12, fontWeight:600 }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:c.dot, flexShrink:0 }} />{status}
    </span>
  );
}

function SectionLabel({ children }) {
  return <div style={{ fontSize:11, fontWeight:600, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.07em', margin:'18px 0 8px' }}>{children}</div>;
}

/* DetailRow: renders value with auto-linked phone numbers */
function DetailRow({ label, value, pre, onClick }) {

  const rendered = typeof value === 'string' ? withPhoneLinks(value) : value;
  return (
    <div style={{ display:'flex', gap:10, padding:'9px 0', borderBottom:'1px solid var(--border)' }}>

        <div style={{ fontSize:11, color:'var(--text-tertiary)', fontWeight:500, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:2 }}>{label}</div>

          onClick={onClick}

      </div>

}

/* ── CONTACT HOSPICE MODAL ────────────────────────────── */
function ContactHospiceModal({ onClose }) {
  const [message, setMessage]           = useState('');
  const [urgent, setUrgent]             = useState(false);
  const [showUrgentAlert, setShowUrgentAlert] = useState(false);
  const [sent, setSent]                 = useState(false);
  const [countdown, setCountdown]       = useState(10);

  /* Auto-close countdown after send */
  useEffect(() => {
    if (!sent) return;
    if (countdown <= 0) { onClose(); return; }
    const t = setTimeout(() => setCountdown(c => c - 1), 1000);
    return () => clearTimeout(t);
  }, [sent, countdown]);

  const handleUrgentChange = (e) => {
    setUrgent(e.target.checked);
    if (e.target.checked) setShowUrgentAlert(true);
  };

  const handleSend = () => {
    if (!message.trim()) return;
    setSent(true);
  };

  const digits = telDigits(hospice.mainPhone);

  return (
    /* Backdrop */
    <div
      onClick={(e) => { if (e.target === e.currentTarget && !sent) onClose(); }}
      style={{ position:'fixed', inset:0, zIndex:300, background:'rgba(20,24,40,0.55)', display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
    >
      {/* Main modal card */}
      <div style={{ position:'relative', background:'#fff', borderRadius:14, boxShadow:'0 8px 32px rgba(30,34,53,0.18)', width:'100%', maxWidth:420, animation:'fadeIn 0.2s ease', overflow:'hidden' }}>

        {/* Header */}
        <div style={{ padding:'18px 20px 0', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <span style={{ fontSize:16, fontWeight:700, color:'var(--text-primary)' }}>Contact Hospice</span>
          {!sent && (
            <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-tertiary)', padding:'4px 6px', borderRadius:6 }}><I.Close/></button>
          )}
        </div>

        {/* Body */}
        <div style={{ padding:'16px 20px 22px', textAlign:'center' }}>
          {!sent ? (
            <>
              <p style={{ fontSize:14, color:'var(--text-secondary)', lineHeight:1.6, marginBottom:20 }}>
                Need to reach out? Call us at the number below or send a message directly. We'll be in touch!
              </p>

              {/* Phone number */}
              <a
                href={`tel:${digits}`}
                style={{ display:'inline-flex', alignItems:'center', gap:8, fontSize:18, fontWeight:700, color:'var(--text-primary)', textDecoration:'none', padding:'10px 20px', background:'var(--blue-light)', borderRadius:8, marginBottom:16 }}
              >
                <I.Phone/> {hospice.mainPhone}
              </a>

              {/* Divider */}
              <div style={{ display:'flex', alignItems:'center', gap:12, margin:'4px 0 16px' }}>
                <div style={{ flex:1, height:1, background:'var(--border)' }}/>
                <span style={{ fontSize:12, fontWeight:600, color:'var(--text-tertiary)', letterSpacing:'0.05em' }}>OR</span>
                <div style={{ flex:1, height:1, background:'var(--border)' }}/>
              </div>

              {/* Message area */}
              <div style={{ marginBottom:14, textAlign:'left' }}>
                <label style={{ display:'block', fontSize:12, fontWeight:600, color:'var(--text-secondary)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:7, textAlign:'center' }}>Send a Message</label>
                <textarea
                  value={message}
                  onChange={e => setMessage(e.target.value)}
                  placeholder="Type your message here…"
                  rows={4}
                  style={{ width:'100%', border:'1px solid var(--border)', borderRadius:var_r, padding:'10px 12px', fontSize:13, color:'var(--text-primary)', resize:'vertical', outline:'none', lineHeight:1.5, textAlign:'left' }}
                  onFocus={e=>e.target.style.borderColor='var(--blue)'}
                  onBlur={e=>e.target.style.borderColor='var(--border)'}
                />
              </div>

              {/* Urgent checkbox */}
              <label style={{ display:'inline-flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:13, color:'var(--text-secondary)', marginBottom:20 }}>
                <input
                  type="checkbox"
                  checked={urgent}
                  onChange={handleUrgentChange}
                  style={{ width:15, height:15, accentColor:'var(--blue)', cursor:'pointer' }}
                />
                Urgent Request?
              </label>

              {/* Send button */}
              <button
                onClick={handleSend}
                disabled={!message.trim()}
                style={{ display:'block', width:'100%', padding:'11px', background: message.trim() ? 'var(--blue)' : '#c7d4fd', color:'#fff', border:'none', borderRadius:var_r, fontSize:14, fontWeight:600, cursor: message.trim() ? 'pointer' : 'not-allowed', transition:'background 0.15s' }}
              >Send Message</button>
            </>
          ) : (
            /* ── Sent confirmation ── */
            <div style={{ padding:'12px 0 4px' }}>
              <div style={{ width:52, height:52, background:'var(--green-bg)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px' }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1db87e" strokeWidth="2.5" strokeLinecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              </div>
              <p style={{ fontSize:15, fontWeight:600, color:'var(--text-primary)', marginBottom:8 }}>
                Your message has been sent.<br/>We will be in touch!
              </p>
              <p style={{ fontSize:13, color:'var(--text-tertiary)', marginTop:12 }}>
                This window will close in <span style={{ fontWeight:700, color:'var(--text-secondary)' }}>{countdown}</span> second{countdown !== 1 ? 's' : ''}…
              </p>
              {/* Progress bar */}
              <div style={{ height:3, background:'var(--border)', borderRadius:99, margin:'16px 0 4px', overflow:'hidden' }}>
                <div style={{ height:'100%', background:'var(--blue)', borderRadius:99, width:`${(countdown/10)*100}%`, transition:'width 0.9s linear' }}/>
              </div>
            </div>
          )}
        </div>

        {/* Urgent alert — small overlay on top of modal */}
        {showUrgentAlert && (
          <div style={{ position:'absolute', inset:0, background:'rgba(30,34,53,0.45)', display:'flex', alignItems:'center', justifyContent:'center', padding:24, borderRadius:14 }}>
            <div style={{ background:'#fff', borderRadius:10, padding:'22px 22px 18px', maxWidth:280, textAlign:'center', boxShadow:'0 4px 20px rgba(30,34,53,0.18)', animation:'fadeIn 0.15s ease' }}>
              <div style={{ width:38, height:38, background:'#fff7ed', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px' }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2.2" strokeLinecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </div>
              <p style={{ fontSize:13, color:'var(--text-secondary)', lineHeight:1.6, marginBottom:16 }}>
                For urgent requests, please consider calling{' '}
                <a href={`tel:${digits}`} className="tel-link" style={{ fontWeight:600, color:'var(--text-primary)' }}>{hospice.mainPhone}</a>
                {' '}as messages may be delayed.
              </p>
              <button
                onClick={() => setShowUrgentAlert(false)}
                style={{ padding:'8px 32px', background:'var(--blue)', color:'#fff', border:'none', borderRadius:var_r, fontSize:13, fontWeight:600, cursor:'pointer' }}
              >OK</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── ORDER TRACKING ───────────────────────────────────── */
function OrderTracking({ order }) {
  const steps = order.tracking || [];
  return (
    <div style={{ padding:'8px 0 4px' }}>
      {steps.map((step, i) => {
        const isLast = i === steps.length - 1;
        const isUpcoming = !step.done && step.upcoming;
        const isFuture   = !step.done && !step.upcoming;
        return (
          <div key={i} style={{ display:'flex', gap:12 }}>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', flexShrink:0 }}>
              <div style={{ width:18, height:18, borderRadius:'50%', flexShrink:0, background:step.done?'var(--blue)':isUpcoming?'var(--blue-light)':'#f3f4f6', border:step.done?'2px solid var(--blue)':isUpcoming?'2px solid var(--blue)':'2px solid #d1d5e0', display:'flex', alignItems:'center', justifyContent:'center' }}>
                {step.done && <svg width="9" height="9" viewBox="0 0 12 12" fill="none"><polyline points="2 6 5 9 10 3" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              {!isLast && <div style={{ width:2, flex:1, minHeight:24, background:step.done?'var(--blue-mid)':'#e3e6ef', margin:'2px 0' }} />}
            </div>
            <div style={{ paddingBottom:isLast?0:18, paddingTop:1 }}>
              <div style={{ fontSize:13, fontWeight:step.done?600:500, color:isFuture?'var(--text-tertiary)':'var(--text-primary)', marginBottom:2 }}>
                {step.label}
                {isUpcoming && <span style={{ marginLeft:8, fontSize:11, fontWeight:600, color:'var(--blue)', background:'var(--blue-light)', padding:'1px 7px', borderRadius:99 }}>Upcoming</span>}
              </div>
              <div style={{ fontSize:12, color:step.done?'var(--text-secondary)':'var(--text-tertiary)' }}>{step.date ? fmt(step.date) : 'Pending'}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── SURVEY TAB ───────────────────────────────────────── */
function SurveyTab({ submitted, onSubmit, orderType }) {
  const deliveryQuestions = [
    "The technician arrived on time.",
    "The technician was professional and courteous.",
    "The technician clearly explained how to use the equipment.",
    "The equipment was clean and in good working order.",
    "My service needs were addressed during the visit.",
    "I feel confident in using the equipment after the visit.",
    "I am satisfied with the service I received from Concergix.",
    "I would recommend Concergix to friends and family.",
  ];
  const pickupQuestions = [
    "The technician arrived on time.",
    "The technician was professional and courteous.",
    "I am satisfied with the service I received from Concergix.",
    "I would recommend Concergix to friends and family.",
  ];
  const introMap = {
    delivery: "We recently delivered medical equipment and want to ensure everything is working well. Please take a moment to rate your experience.",
    service:  "We recently serviced medical equipment and want to ensure everything is working well. Please take a moment to rate your experience.",
    pickup:   "We recently picked-up medical equipment and want to ensure everything is working well. Please take a moment to rate your experience.",
  };
  const questions = orderType === 'pickup' ? pickupQuestions : deliveryQuestions;
  const intro     = introMap[orderType] || introMap.delivery;
  const likert    = ["Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"];
  const [responses, setResponses] = useState({});
  const [comment, setComment]     = useState('');

  if (submitted) {
    return (
      <div style={{ textAlign:'center', padding:'40px 16px' }}>
        <div style={{ width:52, height:52, background:'var(--green-bg)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px' }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1db87e" strokeWidth="2.5" strokeLinecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div style={{ fontSize:15, fontWeight:600, color:'var(--text-primary)', marginBottom:8 }}>Thank you for your feedback!</div>
        <div style={{ fontSize:13, color:'var(--text-secondary)', lineHeight:1.6 }}>Your response has been recorded. We appreciate you taking the time to share your experience.</div>
      </div>
    );
  }

  return (
    <>
      <p style={{ fontSize:13, color:'var(--text-secondary)', lineHeight:1.6, padding:'10px 0 6px' }}>
        {intro}
      </p>
      {questions.map((q, i) => (
        <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 0', borderBottom:'1px solid var(--border)' }}>

          <select
            value={responses[i] || ''}
            onChange={e => setResponses(r => ({...r, [i]: e.target.value}))}
            style={{ flexShrink:0, width:140, padding:'6px 8px', border:'1px solid var(--border)', borderRadius:6, fontSize:12, background:'#fff', color: responses[i] ? 'var(--text-primary)' : 'var(--text-tertiary)', cursor:'pointer', outline:'none' }}
          >
            <option value="" disabled>Select…</option>
            {likert.map(l => <option key={l} value={l}>{l}</option>)}
          </select>
        </div>
      ))}
      <div style={{ marginTop:14 }}>
        <div style={{ fontSize:11, color:'var(--text-tertiary)', fontWeight:500, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>Additional Comments</div>
        <textarea
          value={comment}
          onChange={e => setComment(e.target.value)}

          onFocus={e => e.target.style.borderColor='var(--blue)'}
          onBlur={e  => e.target.style.borderColor='var(--border)'}
        />
      </div>
      <button

      >Submit Survey</button>
    </>
  );
}

/* ── ORDER PANEL ──────────────────────────────────────── */
function OrderPanel({ order, onClose, initialTab, onSurveySubmit }) {
  const [note, setNote]           = useState(order.notes || '');
  const [tab, setTab]             = useState(initialTab || 'detail');
  const [selectedEq, setSelectedEq]   = useState(null);
  const [surveySubmitted, setSurveySubmitted] = useState(false);
  const handleSurveySubmit = () => {
    setSurveySubmitted(true);
    if (onSurveySubmit) onSurveySubmit();
  };
  if (!order) return null;
  const allEq = [...equipment.rentals, ...equipment.other, ...equipment.priorRentals];
  const eqByName = {};
  allEq.forEach(eq => {
    eqByName[eq.name] = eq;
    if (eq.matchNames) eq.matchNames.forEach(n => { eqByName[n] = eq; });
  });

  /* Show equipment sub-panel in place, back returns to order */
  if (selectedEq) {
    return <EquipmentPanel eq={selectedEq} onClose={() => setSelectedEq(null)} />;
  }
  const tabStyle = (id) => ({
    padding:'10px 0 8px', marginRight:20, fontSize:13, fontWeight:600, cursor:'pointer',
    color:tab===id?'var(--blue)':'var(--text-tertiary)',
    borderBottom:tab===id?'2px solid var(--blue)':'2px solid transparent',
  });
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--border)', background:'#fff' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
          <span style={{ fontSize:16, fontWeight:700 }}>{order.id}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-tertiary)', padding:'4px 6px', borderRadius:6 }}><I.Close/></button>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <Badge status={order.status}/>
          <span style={{ fontSize:11, color:'var(--text-tertiary)' }}>{fmt(order.date)}</span>
        </div>
      </div>
      <div style={{ display:'flex', borderBottom:'1px solid var(--border)', background:'#fff', padding:'0 18px' }}>
        <div style={tabStyle('detail')}   onClick={()=>setTab('detail')}>Order Detail</div>
        <div style={tabStyle('tracking')} onClick={()=>setTab('tracking')}>Order Tracking</div>
        <div style={tabStyle('survey')}   onClick={()=>setTab('survey')}>Survey</div>
      </div>
      <div style={{ flex:1, overflow:'auto', padding:'4px 18px 18px' }}>
        {tab === 'detail' && (
          <>
            <SectionLabel>Order Items</SectionLabel>
            {order.items.map((item,i)=>{
              const matchedEq = eqByName[item];
              return matchedEq ? (
                <div key={i} onClick={()=>setSelectedEq(matchedEq)}
                  style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 10px', borderRadius:var_r, background:'var(--blue-light)', marginBottom:5, fontSize:13, cursor:'pointer', color:'var(--text-primary)' }}>
                  <span>{item}</span>
                  <span style={{ color:'var(--blue)', opacity:0.7 }}><I.Chevron/></span>
                </div>
              ) : (
                <div key={i} style={{ padding:'8px 10px', borderRadius:var_r, background:'var(--content-bg)', marginBottom:5, fontSize:13 }}>{item}</div>
              );
            })}
            <DetailRow label="Delivering Office" value={`${order.office.name}\n${order.office.phone}\n${order.office.addr}`} pre />
            <DetailRow label="Ordering Nurse"    value={`${order.nurse.name}\n${order.nurse.phone}\n${order.nurse.email}`} pre />
            <DetailRow label="Fulfill On"        value={fmt(order.fulfillOn)} />
            <DetailRow label="Instructions"      value={order.instructions} pre />
            {order.status === 'Scheduled' && (
              <>
                <SectionLabel>Notes</SectionLabel>
                <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Add a note on this order…"
                  style={{ width:'100%', minHeight:78, border:'1px solid var(--border)', borderRadius:var_r, padding:'9px 12px', fontSize:13, resize:'vertical', outline:'none', color:'var(--text-primary)' }}
                  onFocus={e=>e.target.style.borderColor='var(--blue)'}
                  onBlur={e=>e.target.style.borderColor='var(--border)'} />
                <button style={{ marginTop:8, padding:'7px 18px', background:'var(--blue)', color:'#fff', border:'none', borderRadius:var_r, fontSize:13, fontWeight:600, cursor:'pointer' }}>Save Note</button>
              </>
            )}
          </>
        )}
        {tab === 'tracking' && (
          <>
            <SectionLabel>Order Status</SectionLabel>
            <OrderTracking order={order} />
          </>
        )}
        {tab === 'survey' && (
          <>
            <SectionLabel>{order.type === 'pickup' ? 'Pickup Survey' : order.type === 'service' ? 'Service Survey' : 'Delivery Survey'}</SectionLabel>
            <SurveyTab submitted={surveySubmitted} onSubmit={handleSurveySubmit} orderType={order.type} />
          </>
        )}
      </div>
    </div>
  );
}

/* ── EQUIPMENT PANEL ──────────────────────────────────── */
function EquipmentPanel({ eq, onClose }) {
  const [selectedOrder, setSelectedOrder] = useState(null);
  if (!eq) return null;

  if (selectedOrder) {
    return <OrderPanel order={selectedOrder} onClose={() => setSelectedOrder(null)} />;
  }

  const isPrior             = !!eq.pickedUpOn;
  const deliveryLinkedOrder = isPrior && eq.deliveryOrderNum ? orders.find(o=>o.id===eq.deliveryOrderNum) : null;
  const pickupLinkedOrder   = isPrior && eq.pickupOrderNum   ? orders.find(o=>o.id===eq.pickupOrderNum)   : null;
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--border)', background:'#fff' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
          <span style={{ fontSize:16, fontWeight:400, lineHeight:1.3 }}>{eq.name}</span>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-tertiary)', padding:'4px 6px', borderRadius:6, flexShrink:0 }}><I.Close/></button>
        </div>
        {(eq.serial || eq.lotNum) && (
          <div style={{ fontSize:11, color:'var(--text-tertiary)' }}>
            {eq.serial ? `${eq.id} · S/N: ${eq.serial}` : `Lot #: ${eq.lotNum}`}
          </div>
        )}
      </div>
      <div style={{ display:'flex', borderBottom:'1px solid var(--border)', background:'#fff', padding:'0 18px' }}>
        <div style={{ padding:'10px 0 8px', borderBottom:'2px solid var(--blue)', fontSize:13, fontWeight:600, color:'var(--blue)', cursor:'pointer' }}>Equipment Detail</div>
      </div>
      <div style={{ flex:1, overflow:'auto', padding:'4px 18px 18px' }}>
        <DetailRow label="Type"         value={eq.rate ? 'Active Rental' : isPrior ? 'Prior Rental' : 'Non-Rental'} />
        {!eq.orderDetails && <DetailRow label="Delivered On" value={fmt(eq.deliveredOn)} />}
        {isPrior && <DetailRow label="Picked Up On" value={fmt(eq.pickedUpOn)} />}
        {!isPrior && eq.orderNums && eq.orderNums.length > 0 && (
          <div style={{ display:'flex', gap:10, padding:'9px 0', borderBottom:'1px solid var(--border)' }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:11, color:'var(--text-tertiary)', fontWeight:500, textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:2 }}>
                {eq.orderNums.length > 1 ? 'Orders' : 'Order'}
              </div>
              {eq.orderNums.map((oNum,idx) => {
                const lo = orders.find(o=>o.id===oNum);
                const od = eq.orderDetails && eq.orderDetails[oNum];
                return (
                  <div key={idx} style={{ marginBottom: idx < eq.orderNums.length-1 ? 6 : 0 }}>
                    <div onClick={lo ? ()=>setSelectedOrder(lo) : undefined} style={{ fontSize:13, fontWeight:600, color:'var(--text-primary)', cursor:lo?'pointer':'default', lineHeight:1.4 }}>{oNum}</div>
                    {od && <div style={{ fontSize:12, fontWeight:400, color:'var(--text-tertiary)', marginTop:1 }}>×{od.qty} · Delivered {fmt(od.deliveredOn)}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {isPrior && eq.deliveryOrderNum && <DetailRow label="Delivery Order" value={eq.deliveryOrderNum} onClick={deliveryLinkedOrder ? ()=>setSelectedOrder(deliveryLinkedOrder) : undefined} />}
        {isPrior && eq.pickupOrderNum   && <DetailRow label="Pickup Order"   value={eq.pickupOrderNum}   onClick={pickupLinkedOrder   ? ()=>setSelectedOrder(pickupLinkedOrder)   : undefined} />}
        {eq.description && <DetailRow label="Description" value={eq.description} />}
        {eq.infoSheets && eq.infoSheets.length > 0 && (
          <>
            <SectionLabel>Info Sheets</SectionLabel>
            {eq.infoSheets.map((sheet, i) => (
              <a key={i} href={sheet.url} onClick={e => e.preventDefault()}
                style={{ display:'flex', alignItems:'center', gap:9, padding:'9px 10px', borderRadius:var_r, background:'var(--content-bg)', marginBottom:5, fontSize:13, textDecoration:'none', color:'var(--text-primary)', border:'1px solid var(--border)', cursor:'pointer' }}>
                <I.Pdf/>
                <span style={{ flex:1 }}>{sheet.name}</span>
                <span style={{ color:'var(--text-tertiary)', opacity:0.6 }}><I.Chevron/></span>
              </a>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

/* ── CAMERA PANEL ─────────────────────────────────────── */
function CameraPanel({ onClose }) {
  const [photoTaken, setPhotoTaken] = useState(false);
  const [identifiedEq, setIdentifiedEq] = useState(null);

  const handleTakePhoto = () => {
    const rentals = equipment.rentals;
    const randomEq = rentals[Math.floor(Math.random() * rentals.length)];
    setIdentifiedEq(randomEq);
    setPhotoTaken(true);
  };

  const handleRetry = () => {
    setIdentifiedEq(null);
    setPhotoTaken(false);
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontSize:15, fontWeight:700 }}>Identify Equipment</span>
        <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-tertiary)' }}><I.Close/></button>
      </div>
      {!photoTaken ? (
        <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, gap:16 }}>
          <div style={{ width:'100%', height:200, background:'#1e2235', borderRadius:VAR_R, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:8, color:'#fff' }}>
            <I.Camera/><span style={{ fontSize:13, opacity:0.7 }}>Camera preview</span>
          </div>
          <p style={{ fontSize:13, color:'var(--text-secondary)', textAlign:'center' }}>Take a photo of your equipment to identify it.</p>
          <button onClick={handleTakePhoto} style={{ padding:'9px 24px', background:'var(--blue)', color:'#fff', border:'none', borderRadius:VAR_R, fontSize:13, fontWeight:600, cursor:'pointer', width:'100%' }}>Take Photo</button>
        </div>
      ) : (
        <div style={{ flex:1, padding:24, display:'flex', flexDirection:'column', gap:14 }}>
          <div style={{ padding:'14px 16px', background:'var(--blue-light)', border:'1px solid var(--blue-mid)', borderRadius:VAR_R }}>
            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" strokeWidth="2.5" strokeLinecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              <span style={{ fontSize:11, fontWeight:700, color:'var(--blue)', textTransform:'uppercase', letterSpacing:'0.06em' }}>Equipment Identified</span>
            </div>
            <div style={{ fontSize:15, fontWeight:700, marginBottom: identifiedEq?.description ? 8 : 0 }}>{identifiedEq?.name}</div>
            {identifiedEq?.description && (
              <div style={{ fontSize:13, color:'var(--text-secondary)', lineHeight:1.5 }}>{identifiedEq.description}</div>
            )}
          </div>
          <a href="#" onClick={e=>e.preventDefault()} style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 14px', background:'#fff', border:'1px solid var(--border)', borderRadius:VAR_R, textDecoration:'none', color:'var(--text-primary)', fontSize:13, fontWeight:500, boxShadow:'var(--shadow)' }}>
            <I.FileText/>
            <span>View Information Sheet</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" style={{ marginLeft:'auto', opacity:0.4 }}><polyline points="9 18 15 12 9 6"/></svg>
          </a>
          <button onClick={handleRetry} style={{ padding:'7px 14px', background:'none', border:'1px solid var(--border)', borderRadius:VAR_R, fontSize:13, color:'var(--text-secondary)', cursor:'pointer' }}>Try Another Photo</button>
        </div>
      )}
    </div>
  );
}

/* ── MAIN CONTENT ─────────────────────────────────────── */
function MainContent({ section, onSelectItem, selectedId, onNavigate, isMobile, onContactHospice }) {
  const [eqSearch, setEqSearch] = useState('');
  const eqFilter = (list) => eqSearch.trim()==='' ? list : list.filter(eq=>eq.name.toLowerCase().includes(eqSearch.toLowerCase()));
  const pad = isMobile ? '16px 14px' : '24px 28px';

  /* PATIENT */
  if (section === 'patient') return (
    <div style={{ padding:pad }}>
      <div style={{ background:'#fff', borderRadius:var_r, boxShadow:'var(--shadow)', border:'1px solid var(--border)', overflow:'hidden' }}>
        <div style={{ padding:'18px 20px', borderBottom:'1px solid var(--border)' }}>
          <div style={{ fontSize:17, fontWeight:700, marginBottom:4 }}>{patient.name}</div>
          <div style={{ display:'flex', alignItems:'center', gap:12, fontSize:12, color:'var(--text-secondary)', flexWrap:'wrap' }}>
            <span>DOB: {patient.dob}</span><span>MR: {patient.mr}</span><Badge status={patient.status} />
          </div>
        </div>
        <div style={{ padding:'4px 20px 12px' }}>
          <DetailRow label="Address" value={<a href={`https://maps.google.com/?q=${encodeURIComponent(patient.address.replace(/\n/g,' '))}`} target="_blank" rel="noopener noreferrer" style={{ color:'var(--text-primary)', textDecoration:'none', whiteSpace:'pre-line' }}>{patient.address}</a>} />
          <DetailRow label="Phone"     value={patient.phone} />
          <DetailRow label="Hospice"   value={patient.hospice} onClick={()=>onNavigate('hospice')} />
          <DetailRow label="Team"      value={patient.team} />
          <DetailRow label="Caregiver" value={`${patient.caregiver}\n${patient.caregiverPhone}`} pre />
        </div>
      </div>
    </div>
  );

  /* ORDERS */
  if (section === 'orders') return (
    <div style={{ padding:pad }}>
      <div style={{ background:'#fff', borderRadius:var_r, boxShadow:'var(--shadow)', border:'1px solid var(--border)', overflow:'hidden' }}>
        <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontSize:15, fontWeight:700 }}>Orders</div>
          <span style={{ background:'var(--blue-light)', color:'var(--blue)', borderRadius:99, padding:'2px 9px', fontSize:12, fontWeight:400 }}>{orders.length}</span>
        </div>
        {orders.map((o,i)=>(
          <div key={o.id} onClick={()=>onSelectItem(o)}
            style={{ display:'flex', alignItems:'center', gap:12, padding:'13px 20px', borderBottom:i<orders.length-1?'1px solid var(--border)':'none', cursor:'pointer', background:selectedId===o.id?'var(--blue-light)':'#fff', transition:'background 0.1s' }}>
            {/* Clipboard icon */}
            <div style={{ flexShrink:0 }}>
              {o.type==='pickup' ? <I.ClipboardP size={34}/> : <I.ClipboardD size={34}/>}
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13, fontWeight:600, marginBottom:3 }}>{o.id}</div>
              <div style={{ fontSize:12, color:'var(--text-tertiary)' }}>{fmt(o.date)} &middot; {o.items.length} item{o.items.length!==1?'s':''}</div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
              <Badge status={o.status}/>
              <span style={{ color:'var(--text-tertiary)' }}><I.Chevron/></span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  /* EQUIPMENT */
  if (section === 'equipment') {
    const sortedRentals = [...equipment.rentals].sort((a,b)=>new Date(b.deliveredOn)-new Date(a.deliveredOn));
    const sortedOther   = [...equipment.other].sort((a,b)=>new Date(b.deliveredOn)-new Date(a.deliveredOn));
    const sortedPrior   = [...equipment.priorRentals].sort((a,b)=>new Date(b.pickedUpOn)-new Date(a.pickedUpOn));
    const fR = eqFilter(sortedRentals), fO = eqFilter(sortedOther), fP = eqFilter(sortedPrior);
    return (
      <div style={{ padding:pad }}>
        <div style={{ background:'#fff', borderRadius:var_r, boxShadow:'var(--shadow)', border:'1px solid var(--border)', overflow:'hidden' }}>
          <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div style={{ fontSize:15, fontWeight:700 }}>Equipment</div>
            <button onClick={()=>onSelectItem({type:'camera'})} style={{ display:'flex', alignItems:'center', gap:6, padding:'5px 11px', background:'var(--blue-light)', color:'var(--blue)', border:'none', borderRadius:var_r, fontSize:12, fontWeight:600, cursor:'pointer' }}>
              <I.Camera/> Identify Equipment
            </button>
          </div>
          <div style={{ padding:'12px 20px', borderBottom:'1px solid var(--border)' }}>
            <div style={{ position:'relative' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--text-tertiary)', pointerEvents:'none' }}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" value={eqSearch} onChange={e=>setEqSearch(e.target.value)} placeholder="Search equipment…"
                style={{ width:'100%', padding:'8px 10px 8px 32px', border:'1px solid var(--border)', borderRadius:var_r, fontSize:13, outline:'none', background:'var(--content-bg)' }}
                onFocus={e=>e.target.style.borderColor='var(--blue)'}
                onBlur={e=>e.target.style.borderColor='var(--border)'} />
              {eqSearch && <button onClick={()=>setEqSearch('')} style={{ position:'absolute', right:8, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'var(--text-tertiary)', padding:2, display:'flex' }}><I.Close/></button>}
            </div>
          </div>

          <div style={{ padding:'10px 20px 2px' }}><div style={{ fontSize:11, fontWeight:600, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.06em' }}>Active Rentals</div></div>
          {fR.map(eq=>(
            <div key={eq.id} onClick={()=>onSelectItem(eq)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'11px 20px', borderBottom:'1px solid var(--border)', cursor:'pointer', background:selectedId===eq.id?'var(--blue-light)':'#fff', transition:'background 0.1s' }}>
              <div style={{ minWidth:0, marginRight:8 }}>
                <div style={{ fontSize:13, fontWeight:400, marginBottom:3 }}>{eq.name}</div>
                <div style={{ fontSize:12, color:'var(--text-tertiary)' }}>
                  {eq.lotNum ? `Lot #: ${eq.lotNum}` : [eq.asset && `Asset #: ${eq.asset}`, eq.serial && `S/N: ${eq.serial}`].filter(Boolean).join(', ')}
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:11, color:'var(--text-tertiary)', marginBottom:2 }}>Delivered</div>
                  <div style={{ fontSize:12, color:'var(--text-secondary)' }}>{eq.orderNums&&eq.orderNums.length>1 ? 'Multiple Orders' : fmt(eq.deliveredOn)}</div>
                </div>
                <span style={{ color:'var(--text-tertiary)' }}><I.Chevron/></span>
              </div>
            </div>
          ))}

          <div style={{ padding:'12px 20px 2px', borderTop:'1px solid var(--border)' }}><div style={{ fontSize:11, fontWeight:600, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.06em' }}>Other Equipment</div></div>
          {fO.map(eq=>(
            <div key={eq.id} onClick={()=>onSelectItem(eq)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'11px 20px', borderBottom:'1px solid var(--border)', cursor:'pointer', background:selectedId===eq.id?'var(--blue-light)':'#fff', transition:'background 0.1s' }}>
              <div style={{ fontSize:13, fontWeight:400, minWidth:0, marginRight:8 }}>{eq.name}</div>
              <div style={{ display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:11, color:'var(--text-tertiary)', marginBottom:2 }}>Delivered</div>
                  <div style={{ fontSize:12, color:'var(--text-secondary)' }}>{eq.orderNums&&eq.orderNums.length>1 ? 'Multiple Orders' : fmt(eq.deliveredOn)}</div>
                </div>
                <span style={{ color:'var(--text-tertiary)' }}><I.Chevron/></span>
              </div>
            </div>
          ))}

          <div style={{ padding:'12px 20px 2px', borderTop:'1px solid var(--border)' }}><div style={{ fontSize:11, fontWeight:600, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.06em' }}>Prior Rentals</div></div>
          {fP.map((eq,i)=>(
            <div key={eq.id} onClick={()=>onSelectItem(eq)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'11px 20px', borderBottom:i<fP.length-1?'1px solid var(--border)':'none', cursor:'pointer', background:selectedId===eq.id?'var(--blue-light)':'#fff', transition:'background 0.1s', opacity:0.85 }}>
              <div style={{ fontSize:13, fontWeight:400, minWidth:0, marginRight:8 }}>{eq.name}</div>
              <div style={{ display:'flex', alignItems:'center', gap:isMobile?8:16, flexShrink:0 }}>
                {!isMobile && (
                  <div style={{ textAlign:'right' }}>
                    <div style={{ fontSize:11, color:'var(--text-tertiary)', marginBottom:2 }}>Delivered</div>
                    <div style={{ fontSize:12, color:'var(--text-secondary)' }}>{fmt(eq.deliveredOn)}</div>
                  </div>
                )}
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:11, color:'var(--text-tertiary)', marginBottom:2 }}>Picked Up</div>
                  <div style={{ fontSize:12, color:'var(--text-secondary)' }}>{fmt(eq.pickedUpOn)}</div>
                </div>
                <span style={{ color:'var(--text-tertiary)' }}><I.Chevron/></span>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* HOSPICE */
  if (section === 'hospice') return (
    <div style={{ padding:pad }}>
      <div style={{ background:'#fff', borderRadius:var_r, border:'1px solid var(--border)', boxShadow:'var(--shadow)', overflow:'hidden' }}>
        <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ fontSize:15, fontWeight:700 }}>{hospice.name}</div>
          <button
            onClick={onContactHospice}
            style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 13px', background:'var(--blue-light)', color:'var(--blue)', border:'none', borderRadius:var_r, fontSize:12, fontWeight:600, cursor:'pointer', flexShrink:0 }}
          >
            <I.Phone/> Contact Hospice
          </button>
        </div>
        <div style={{ padding:'4px 20px 12px' }}>
          <DetailRow label="Phone"       value={hospice.mainPhone} />
          <DetailRow label="After-Hours" value={hospice.afterHours} />
          <DetailRow label="Address" value={<a href={`https://maps.google.com/?q=${encodeURIComponent(hospice.address.replace(/\n/g,' '))}`} target="_blank" rel="noopener noreferrer" style={{ color:'var(--text-primary)', textDecoration:'none', whiteSpace:'pre-line' }}>{hospice.address}</a>} />
        </div>
      </div>
    </div>
  );

  return null;
}

/* ── LOGIN PAGE ───────────────────────────────────────── */
function LoginPage({ onLogin }) {
  const [firstName, setFirstName] = useState('');
  const [dob, setDob] = useState('');
  const [error, setError] = useState('');
  const [shake, setShake] = useState(false);
  const handleSubmit = (e) => {
    e.preventDefault();
    const dobNorm = dob.replace(/\s/g,'');
    if (firstName.trim().toLowerCase()==='adam' && (dobNorm==='1/1/2000'||dobNorm==='01/01/2000')) {
      onLogin();
    } else {
      setError(`We were unable to sign in. Please contact your hospice at ${hospice.mainPhone}`);
      setShake(true); setTimeout(()=>setShake(false), 600);
    }
  };
  return (
    <div style={{ height:'100vh', background:'var(--content-bg)', display:'flex', alignItems:'center', justifyContent:'center', padding:'0 20px' }}>
      <div style={{ width:'100%', maxWidth:420 }}>
        <div style={{ display:'flex', justifyContent:'center', marginBottom:32 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <svg width="36" height="36" viewBox="0 0 26 26" fill="none"><circle cx="9" cy="13" r="7" fill="#ff7a45" opacity="0.9"/><circle cx="17" cy="13" r="7" fill="#4f90f0" opacity="0.9"/></svg>
            <span style={{ fontSize:26, fontWeight:700, color:'var(--text-primary)', letterSpacing:'-0.01em' }}>resolve</span>
          </div>
        </div>
        <div style={{ background:'#fff', borderRadius:12, border:'1px solid var(--border)', boxShadow:'var(--shadow-md)', padding:'32px 32px 28px', animation:shake?'shake 0.5s ease':'none' }}>
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:20, fontWeight:700, marginBottom:6 }}>Patient Portal</div>
            <div style={{ fontSize:14, color:'var(--text-secondary)' }}>Please verify your identity to continue.</div>
          </div>
          <form onSubmit={handleSubmit}>
            <div style={{ marginBottom:16 }}>
              <label style={{ display:'block', fontSize:12, fontWeight:600, color:'var(--text-secondary)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>First Name</label>
              <input type="text" value={firstName} onChange={e=>{setFirstName(e.target.value);setError('');}} placeholder="Enter your first name" required
                style={{ width:'100%', padding:'10px 12px', border:'1px solid var(--border)', borderRadius:VAR_R, fontSize:14, outline:'none' }}
                onFocus={e=>e.target.style.borderColor='var(--blue)'} onBlur={e=>e.target.style.borderColor='var(--border)'} />
            </div>
            <div style={{ marginBottom:24 }}>
              <label style={{ display:'block', fontSize:12, fontWeight:600, color:'var(--text-secondary)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>Date of Birth</label>
              <input type="text" value={dob} onChange={e=>{setDob(e.target.value);setError('');}} placeholder="M/D/YYYY" required
                style={{ width:'100%', padding:'10px 12px', border:'1px solid var(--border)', borderRadius:VAR_R, fontSize:14, outline:'none' }}
                onFocus={e=>e.target.style.borderColor='var(--blue)'} onBlur={e=>e.target.style.borderColor='var(--border)'} />
            </div>
            {error && (
              <div style={{ marginBottom:16, padding:'10px 14px', background:'#fef2f2', border:'1px solid #fecaca', borderRadius:VAR_R, fontSize:13, color:'#b91c1c', lineHeight:1.5 }}>
                {withPhoneLinks(error)}
              </div>
            )}
            <button type="submit" style={{ width:'100%', padding:'11px', background:'var(--blue)', color:'#fff', border:'none', borderRadius:VAR_R, fontSize:14, fontWeight:600, cursor:'pointer' }}>Sign In</button>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── USER MENU ────────────────────────────────────────── */
function UserMenu({ name, onSignOut, light }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ position:'relative' }}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{ background:'none', border:'none', cursor:'pointer', color:light?'rgba(255,255,255,0.8)':'var(--text-secondary)', padding:'4px 6px', borderRadius:6, display:'flex', alignItems:'center', gap:6 }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      {open && (
        <>
          <div onClick={()=>setOpen(false)} style={{ position:'fixed', inset:0, zIndex:10 }}/>
          <div style={{ position:'absolute', right:0, top:'calc(100% + 6px)', background:'#fff', border:'1px solid var(--border)', borderRadius:VAR_R, boxShadow:'var(--shadow-md)', minWidth:180, zIndex:20, overflow:'hidden' }}>
            <div style={{ padding:'12px 14px', borderBottom:'1px solid var(--border)' }}>
              <div style={{ fontSize:13, fontWeight:600 }}>{name}</div>
              <div style={{ fontSize:11, color:'var(--text-tertiary)' }}>Patient</div>
            </div>
            <button onClick={onSignOut} style={{ display:'flex', alignItems:'center', gap:8, width:'100%', padding:'10px 14px', background:'none', border:'none', cursor:'pointer', fontSize:13, color:'var(--text-secondary)', textAlign:'left' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Sign Out
            </button>
          </div>
        </>
      )}
    </div>
  );
}

/* ── APP ───────────────────────────────────────────────── */
function App() {
  const [loggedIn, setLoggedIn]                   = useState(false);
  const [userName, setUserName]                   = useState('');
  const [section, setSection]                     = useState('patient');
  const [selected, setSelected]                   = useState(null);
  const [isMobile, setIsMobile]                   = useState(window.innerWidth <= 767);
  const [showContact, setShowContact]             = useState(false);
  const [surveyBannerDismissed, setSurveyBannerDismissed] = useState(false);
  const [openOnSurveyId, setOpenOnSurveyId]       = useState(null);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= 767);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const nav = [
    { id:'patient',   label:'Patient',   icon:(size)=><I.Patient   size={size}/> },
    { id:'hospice',   label:'Hospice',   icon:(size)=><I.Hospice   size={size}/> },
    { id:'orders',    label:'Orders',    icon:(size)=><I.Orders    size={size}/> },
    { id:'equipment', label:'Equipment', icon:(size)=><I.Equipment size={size}/> },
  ];

  const handleLogin   = () => { setUserName(`${patient.firstName} ${patient.lastName}`); setLoggedIn(true); };
  const handleSignOut = () => { setLoggedIn(false); setUserName(''); setSection('patient'); setSelected(null); };
  const handleSection = (id) => { setSection(id); setSelected(null); };
  const handleSelect  = (item) => { setOpenOnSurveyId(null); setSelected(item); };
  const handleClose   = () => setSelected(null);
  const handleSurveyBannerClick = () => {
    const so = orders.find(o => o.id === SURVEY_ORDER_ID);
    if (!so) return;
    setOpenOnSurveyId(SURVEY_ORDER_ID);
    setSection('orders');
    setSelected(so);
  };

  if (!loggedIn) return <LoginPage onLogin={handleLogin} />;

  const breadcrumb = nav.find(n=>n.id===section)?.label || '';
  const showPanel  = !!selected;

  const panelContent = () => {
    if (!selected) return null;
    if (selected.type === 'camera') return <CameraPanel onClose={handleClose} />;
    if (section === 'patient')   return <PatientPanel onClose={handleClose} />;
    if (section === 'orders')    return <OrderPanel key={selected.id} order={selected} onClose={handleClose} initialTab={selected.id === openOnSurveyId ? 'survey' : 'detail'} onSurveySubmit={() => setSurveyBannerDismissed(true)} />;
    if (section === 'equipment') return (
      <EquipmentPanel eq={selected} onClose={handleClose} />
    );
    return null;
  };

  const mainContent = (
    <MainContent
      section={section}
      onSelectItem={handleSelect}
      selectedId={selected?.id}
      onNavigate={handleSection}
      isMobile={isMobile}
      onContactHospice={() => setShowContact(true)}
    />
  );

  const surveyOrder = orders.find(o => o.id === SURVEY_ORDER_ID);
  const surveyBanner = !surveyBannerDismissed && surveyOrder ? (
    <div style={{ background:'#fffbeb', borderBottom:'1px solid #fde68a', padding:'9px 16px', display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
      <I.ClipboardSurvey/>
      <span style={{ flex:1, fontSize:13, color:'#78350f', lineHeight:1.4 }}>
        You have a service survey available from your delivery on <strong>{fmt(surveyOrder.fulfillOn)}</strong>.
      </span>
      <button onClick={handleSurveyBannerClick}
        style={{ padding:'5px 12px', background:'#f59e0b', color:'#fff', border:'none', borderRadius:6, fontSize:12, fontWeight:600, cursor:'pointer', flexShrink:0, whiteSpace:'nowrap' }}>
        Take Survey
      </button>
      <button onClick={() => setSurveyBannerDismissed(true)}
        style={{ background:'none', border:'none', cursor:'pointer', color:'#92400e', fontSize:12, fontWeight:500, padding:'4px 2px', flexShrink:0 }}>
        Dismiss
      </button>
    </div>
  ) : null;

  /* ── MOBILE ── */
  if (isMobile) return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden', background:'var(--content-bg)' }}>
      <div style={{ background:'var(--sidebar-top)', padding:'11px 16px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <ResolveLogo/>
        <UserMenu name={userName} onSignOut={handleSignOut} light />
      </div>
      <div style={{ padding:'10px 16px', flexShrink:0, display:'flex', alignItems:'center', gap:7 }}>
        <span style={{ fontSize:12, fontWeight:500, color:'var(--text-tertiary)' }}>Patient Portal</span>
        <span style={{ color:'var(--text-tertiary)', fontSize:12 }}>&bull;</span>
        <span style={{ fontSize:12, fontWeight:700 }}>{breadcrumb}</span>
      </div>
      {surveyBanner}
      <div style={{ flex:1, overflow:'auto', paddingBottom:'var(--tab-bar-h)' }}>{mainContent}</div>
      <div style={{ position:'fixed', bottom:0, left:0, right:0, height:'var(--tab-bar-h)', background:'#fff', borderTop:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-around', zIndex:50, boxShadow:'0 -2px 10px rgba(30,34,53,0.07)' }}>
        {nav.map(n=>(
          <button key={n.id} onClick={()=>handleSection(n.id)} style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:4, flex:1, height:'100%', background:'none', border:'none', cursor:'pointer', color:section===n.id?'var(--blue)':'var(--text-tertiary)', padding:'0 4px' }}>
            {n.icon(section===n.id?22:20)}
            <span style={{ fontSize:10, fontWeight:section===n.id?700:400 }}>{n.label}</span>
          </button>
        ))}
      </div>
      {showPanel && (
        <div style={{ position:'fixed', inset:0, zIndex:100, background:'#fff', display:'flex', flexDirection:'column', animation:'slideUp 0.22s ease' }}>
          <div style={{ background:'var(--sidebar-top)', padding:'11px 14px', display:'flex', alignItems:'center', gap:8, flexShrink:0 }}>
            <button onClick={handleClose} style={{ display:'flex', alignItems:'center', gap:5, background:'none', border:'none', cursor:'pointer', color:'rgba(255,255,255,0.9)', fontSize:14, fontWeight:500 }}>
              <I.ChevronLeft/> Back
            </button>
          </div>
          <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>{panelContent()}</div>
        </div>
      )}
      {showContact && <ContactHospiceModal onClose={() => setShowContact(false)} />}
    </div>
  );

  /* ── DESKTOP ── */
  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      {/* Sidebar */}
      <div style={{ width:220, display:'flex', flexDirection:'column', flexShrink:0 }}>
        <div style={{ background:'var(--sidebar-top)', padding:'15px 16px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <ResolveLogo/>
          <button style={{ background:'none', border:'none', cursor:'pointer', color:'rgba(255,255,255,0.5)', padding:4 }}><I.Menu/></button>
        </div>
        <div style={{ flex:1, background:'var(--sidebar-blue)', padding:'16px 10px', display:'flex', flexDirection:'column' }}>
          <div style={{ fontSize:15, fontWeight:700, color:'#fff', padding:'4px 8px 14px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            Patient Portal <I.ChevronDown/>
          </div>
          {nav.map(n=>(
            <button key={n.id} onClick={()=>handleSection(n.id)} style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'10px 10px', marginBottom:2, border:'none', borderRadius:6, cursor:'pointer', background:section===n.id?'var(--nav-active-bg)':'transparent', color:'#fff', fontSize:14, fontWeight:section===n.id?600:400, textAlign:'left', transition:'background 0.1s' }}>
              <span style={{ opacity:section===n.id?1:0.7 }}>{n.icon(16)}</span>
              <span style={{ opacity:section===n.id?1:0.85 }}>{n.label}</span>
            </button>
          ))}
        </div>
      </div>
      {/* Center */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', background:'var(--content-bg)' }}>
        <div style={{ padding:'11px 20px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:7 }}>
            <span style={{ fontSize:13, fontWeight:500, color:'var(--text-tertiary)' }}>Patient Portal</span>
            <span style={{ color:'var(--text-tertiary)', fontSize:13 }}>&bull;</span>
            <span style={{ fontSize:13, fontWeight:700 }}>{breadcrumb}</span>
          </div>
          <UserMenu name={userName} onSignOut={handleSignOut} />
        </div>
        {surveyBanner}
        <div style={{ flex:1, overflow:'auto', borderRight:'1px solid var(--border)' }}>{mainContent}</div>
      </div>
      {/* Right panel */}
      {showPanel && (
        <div style={{ width:340, flexShrink:0, background:'#fff', borderLeft:'1px solid var(--border)', overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'-2px 0 8px rgba(30,34,53,0.06)' }}>
          {panelContent()}
        </div>
      )}
      {/* Contact modal (portal-level so it overlays everything) */}
      {showContact && <ContactHospiceModal onClose={() => setShowContact(false)} />}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
